name: Deploy Copa 2026 to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export:web
        env:
          EXPO_PUBLIC_FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-build

      - uses: actions/deploy-pages@v4
        id: deploy
